<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Employee Management System</h1>
    <p>Manage Employees using Local Storage</p>
</header>

<div class="container">

    <div class="stats">
        <div class="card">
            <h3>Total Employees</h3>
            <h2 id="employeeCount">0</h2>
        </div>
    </div>

    <div class="main">

        <!-- Form -->

        <div class="form-container">

            <h2 id="formTitle">Add Employee</h2>

            <form id="employeeForm">

                <div class="input-group">
                    <label>Employee ID</label>
                    <input
                        type="text"
                        id="employeeId"
                        placeholder="EMP001"
                        required>
                </div>

                <div class="input-group">

    <label for="name">Name</label>

    <input
        type="text"
        id="name"
        placeholder="Enter Name">

    <small id="nameError" class="error-message"></small>

</div>

                <div class="input-group">
                    <label>Email</label>
                    <input
                        type="email"
                        id="email"
                        required>
                </div>

   <div class="form-group">
    <label for="phone">Phone Number</label>

    <input
        type="tel"
        id="phone"
        name="phone"
        placeholder="Enter Phone Number"
        maxlength="10"
        required>

    <small id="phoneError" class="error-message"></small>
</div>
                <div class="input-group">
                    <label>Department</label>

                    <select id="department" required>

                        <option value="">Select Department</option>

                        <option>HR</option>
                        <option>IT</option>
                        <option>Finance</option>
                        <option>Marketing</option>
                        <option>Sales</option>

                    </select>

                </div>

                <div class="input-group">
                    <label>Position</label>

                    <input
                        type="text"
                        id="position"
                        required>

                </div>

                <div class="input-group">

                    <label>Joining Date</label>

                    <input
                        type="date"
                        id="joiningDate"
                        required>

                </div>

                <div class="buttons">

                    <button
                        class="addBtn"
                        id="submitBtn"
                        type="submit">

                        Add Employee

                    </button>

                    <button
                        type="button"
                        class="cancelBtn"
                        id="cancelBtn">

                        Cancel

                    </button>

                    <button
                        type="reset"
                        class="clearBtn">

                        Clear

                    </button>

                </div>

            </form>

        </div>

        <!-- Table -->

        <div class="table-container">

            <div class="table-top">

                <input
                    type="text"
                    id="search"
                    placeholder="Search by Name, Email or Department">

                <button
                    id="exportBtn">

                    Export CSV

                </button>

            </div>

            <table>

                <thead>

                <tr>

                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Department</th>
                    <th>Position</th>
                    <th>Joining Date</th>
                    <th>Actions</th>

                </tr>

                </thead>

                <tbody id="employeeTable">

                    <tr>

                        <td colspan="7">

                            No employees found

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

<div id="toast"></div>

<script src="script.js"></script>

</body>
</html>
